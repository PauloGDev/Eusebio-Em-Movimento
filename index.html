<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.svg" />

    <!-- Responsividade -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Cor do navegador mobile -->
    <meta name="theme-color" content="#07110D" />

    <!-- SEO -->
    <title>Eusébio em Movimento | Programa de Mobilidade Urbana</title>

    <meta
      name="description"
      content="Conheça o programa Eusébio em Movimento, iniciativa voltada para a transformação da mobilidade urbana com soluções sustentáveis, acessíveis e integradas para a cidade."
    />

    <meta
      name="keywords"
      content="Eusébio em Movimento, mobilidade urbana, Eusébio, transporte público, mobilidade sustentável, infraestrutura urbana, planejamento urbano"
    />

    <meta
      name="author"
      content="Prefeitura Municipal de Eusébio"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Eusébio em Movimento | Programa de Mobilidade Urbana"
    />

    <meta
      property="og:description"
      content="Transformando a mobilidade urbana para uma cidade mais sustentável, acessível e dinâmica."
    />

    <meta
      property="og:image"
      content="/src/assets/logo.png"
    />

    <meta
      property="og:type"
      content="website"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Eusébio em Movimento"
    />

    <meta
      name="twitter:description"
      content="Conheça o programa de mobilidade urbana que busca transformar o futuro da cidade de Eusébio."
    />

    <meta
      name="twitter:image"
      content="/src/assets/logo.png"
    />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
